# This config is for the extra experiment with 1000 features
# to see which libraries break or time out

benchmark:
  seed: [0] # single seed is enough for this stress test
  n_background: [100]
  n_eval: 10 # lower is fine, as we do not care about accuracy here, just runtime and memory
  approx_backends: [shap, shapiq, lightshap, dalex]
  approximators: [kernel, permutation]
  budgets: [2048] # high to account for the extra cost of 1000 features
  imputer: marginal
  backend_timeout_s: 3600

models:
  random_forest:
    n_estimators: [100]
    # n_estimators: {min: 50, max: 200, step: 50}
    max_depth: [null]
    # max_depth: [null, 10, 20]
    min_samples_split: [2]
    # min_samples_split: [2, 5]

  decision_tree:
    max_depth: [null]
    # max_depth: [null, 5, 10, 20]
    min_samples_split: [2]
    # min_samples_split: [2, 5, 10]

  linear_regularized:
    alpha: [1.0]
    # alpha: {min: 0.1, max: 1.0, num_steps: 4}
    C: [1.0]
    # C: {min: 0.1, max: 1.0, step: 0.3}

  gradient_boosting:
    learning_rate: [0.1]
    # learning_rate: [0.05, 0.1, 0.2]
    max_iter: [100]
    # max_iter: [100, 200]

datasets:
  gisette:
    n_features: [1000] # extremely high-dimensional stress test
    n_samples: [1000]