benchmark:
  seed: 42
  imputer: marginal
  n_background: 50
  n_eval: 5
  libraries: [captum, shap_nn, lightshap, dalex]
  approximators: [gradient_shap, deep_lift_shap, gradient, deep, kernel, permutation]
  budgets: [64]
  nn_true_value_libraries: [shapiq]
  device: cpu # cuda for GPU and cpu for CPU.

models:
  mlp:
    hidden_sizes: [[16, 8]]
    epochs: [2]
    lr: [0.001]
    batch_size: [32]

  transformer:
    d_model: [16]
    nhead: [2]
    num_layers: [1]
    epochs: [2]
    lr: [0.001]
    batch_size: [32]

  cnn_1d:
    n_filters: [16]
    kernel_size: [3]
    epochs: [2]
    lr: [0.001]
    batch_size: [32]

datasets:
  adult_census:
    n_features: [4]
    n_samples: [200]
