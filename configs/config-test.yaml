benchmark:
  seed: 42
  imputer: marginal
  n_background: 100
  n_eval: 8
  libraries: [shap, shapiq, lightshap, dalex]
  approximators: [kernel, permutation]
  budgets: [64]

models:
  random_forest:
    n_estimators: [5]
    max_depth: [3]
    min_samples_split: [2]

datasets:
  california_housing:
    n_features:
      min: 4
      max: 6
      step: 1
    n_samples: [1000]
