benchmark:
  seed: 42
  imputer: marginal
  n_background: 200
  n_eval: 100
  # Approximation sweep (library × approximator × budget), filtered by
  # each backend's SUPPORTED_APPROXIMATORS:
  #   captum       -> gradient_shap, deep_lift_shap  (NN gradient-based)
  #   shap_nn      -> gradient, deep                 (NN gradient-based)
  #   lightshap    -> kernel, permutation            (model-agnostic)
  #   dalex        -> permutation                    (model-agnostic)
  #   shapiq_proxy -> proxy                          (model-agnostic, ProxySHAP)
  libraries: [captum, shap_nn, lightshap, dalex, shapiq_proxy]
  approximators: [gradient_shap, deep_lift_shap, gradient, deep, kernel, permutation, proxy]
  budgets: [512]
  # shapiq uses ShapIQTrueValueBackend (TabularExplainer with auto-selected
  # approximator, no explicit approximator sweep).
  nn_true_value_libraries: [shapiq]
  device: cuda # cuda for GPU and cpu for CPU.

models:
  mlp:
    hidden_sizes: [[128, 64]]
    epochs: [50]
    lr: [0.001]
    batch_size: [64]

  transformer:
    d_model: [64]
    nhead: [4]
    num_layers: [2]
    epochs: [50]
    lr: [0.001]
    batch_size: [64]

  cnn_1d:
    n_filters: [64]
    kernel_size: [3]
    epochs: [50]
    lr: [0.001]
    batch_size: [64]

# Fixed feature counts per dataset — no sweep. Neural networks consume all
# selected features without the budget-driven dimensionality constraints that
# model-agnostic approximators face.
datasets:
  ames_housing:
    n_features: [79]
    n_samples: [1000]

  adult_census:
    n_features: [14]
    n_samples: [1000]

  gisette:
    n_features: [256]
    n_samples: [1000]
