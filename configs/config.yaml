models:
  random_forest:
    n_estimators: [5]
    # n_estimators: {min: 50, max: 200, step: 50}
    max_depth: [3]
    # max_depth: [null, 10, 20]
    min_samples_split: [2]
    # min_samples_split: [2, 5]

  decision_tree:
    max_depth: [3]
    # max_depth: [null, 5, 10, 20]
    min_samples_split: [2]
    # min_samples_split: [2, 5, 10]

  linear_regularized:
    alpha: [0.1]
    # alpha: {min: 0.1, max: 1.0, num_steps: 4}
    C: [0.1]
    # C: {min: 0.1, max: 1.0, step: 0.3}

  gradient_boosting:
    learning_rate: [0.1]
    # learning_rate: [0.05, 0.1, 0.2]
    max_iter: [10]
    # max_iter: [100, 200]

